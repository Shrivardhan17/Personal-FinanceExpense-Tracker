<div class="form-container">
  <h3>Add New Expense</h3>
  <input type="text" placeholder="What did you buy?" #titleInput>
  <input type="number" placeholder="Amount ($)" #amountInput>
  
  <select #categoryInput>
    <option value="Food">Food</option>
    <option value="Rent">Rent</option>
    <option value="Entertainment">Entertainment</option>
    <option value="Other">Other</option>
  </select>

  <button (click)="addExpense(titleInput.value, amountInput.value, categoryInput.value)">
    Add Expense
  </button>
</div>
